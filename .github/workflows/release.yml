name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY="kubectl-sheep"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi

          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/ahoz/kubectl-sheep/internal/cmd.Version=${{ github.ref_name }}" \
            -o "dist/${BINARY}" \
            ./cmd/kubectl-sheep

      - name: Package archive
        shell: bash
        run: |
          NAME="kubectl-sheep_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "dist/${NAME}"
          cp LICENSE "dist/${NAME}/LICENSE"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            mv dist/kubectl-sheep.exe "dist/${NAME}/kubectl-sheep.exe"
            (cd dist && zip -r "${NAME}.zip" "${NAME}")
          else
            mv dist/kubectl-sheep "dist/${NAME}/kubectl-sheep"
            chmod +x "dist/${NAME}/kubectl-sheep"
            tar -czf "dist/${NAME}.tar.gz" -C "dist/${NAME}" kubectl-sheep LICENSE
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: kubectl-sheep-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/kubectl-sheep_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: find dist -type f | sort

      - name: Generate release notes body
        run: |
          chmod +x hack/generate-release-notes-body.sh
          hack/generate-release-notes-body.sh "${{ github.ref_name }}" > release-notes.md
          echo "Generated release notes body:"
          cat release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body_path: release-notes.md
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update new version in krew-index
        uses: rajatjindal/krew-release-bot@v0.0.51
